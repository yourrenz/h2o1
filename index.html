<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>H2O Sentezi 3D Model</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Kaydırma çubuklarını gizler */
            background-color: #0a0a1a; /* Derin ve koyu bir arka plan */
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-family: Arial, sans-serif;
            pointer-events: none;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="info">H2O Sentezi: Moleküller Birleşiyor...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. Sahne, Kamera ve Render Ayarları (Kural 1 & 2: Stabil ve Uyumluluk)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Mobil cihazlar için netlik ayarı
        document.body.appendChild(renderer.domElement);

        // Işıklandırma
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 0.8);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // 2. Atomların Oluşturulması (Kimya felsefesi)
        // Oksijen (Kırmızı, daha büyük)
        const oxygenGeometry = new THREE.SphereGeometry(1, 32, 32);
        const oxygenMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const oxygen = new THREE.Mesh(oxygenGeometry, oxygenMaterial);
        
        // Hidrojenler (Beyaz, daha küçük)
        const hydrogenGeometry = new THREE.SphereGeometry(0.5, 32, 32);
        const hydrogenMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
        
        const hydrogen1 = new THREE.Mesh(hydrogenGeometry, hydrogenMaterial);
        const hydrogen2 = new THREE.Mesh(hydrogenGeometry, hydrogenMaterial);

        // Atomların başlangıç pozisyonları (Ayrı noktalardan havaya yükselecekler)
        oxygen.position.set(-3, -5, -2);
        hydrogen1.position.set(3, -6, 2);
        hydrogen2.position.set(0, -7, 3);

        scene.add(oxygen);
        scene.add(hydrogen1);
        scene.add(hydrogen2);

        // Su Damlası (Birleşme sonrası ortaya çıkacak, başlangıçta gizli)
        const waterGeometry = new THREE.SphereGeometry(1.5, 32, 32);
        const waterMaterial = new THREE.MeshStandardMaterial({ color: 0x00aaff, transparent: true, opacity: 0.8 });
        const waterDrop = new THREE.Mesh(waterGeometry, waterMaterial);
        waterDrop.position.set(0, 0, 0);
        waterDrop.visible = false;
        scene.add(waterDrop);

        camera.position.z = 8;

        // 3. Animasyon Döngüsü (Kural 4: Havaya yükselme ve birleşme hissi)
        let isMerged = false;

        function animate() {
            requestAnimationFrame(animate);

            if (!isMerged) {
                // Yavaşça yukarı (Y ekseni) ve merkeze (0,0,0) doğru hareket
                oxygen.position.lerp(new THREE.Vector3(0, 0, 0), 0.01);
                hydrogen1.position.lerp(new THREE.Vector3(0, 0, 0), 0.015);
                hydrogen2.position.lerp(new THREE.Vector3(0, 0, 0), 0.012);

                // Birleşme noktasına (merkeze) olan mesafeyi kontrol et
                if (oxygen.position.distanceTo(new THREE.Vector3(0,0,0)) < 0.2) {
                    isMerged = true;
                    // Atomları gizle, suyu göster
                    oxygen.visible = false;
                    hydrogen1.visible = false;
                    hydrogen2.visible = false;
                    
                    waterDrop.visible = true;
                    document.getElementById('info').innerText = "Su (H2O) Başarıyla Oluştu!";
                }
            } else {
                // Su oluştuktan sonra hafifçe dalgalanma/dönme efekti
                waterDrop.rotation.y += 0.01;
                waterDrop.position.y = Math.sin(Date.now() * 0.002) * 0.5; // Yukarı aşağı süzülme
            }

            renderer.render(scene, camera);
        }

        animate();

        // Pencere boyutu değiştiğinde veya mobil cihaz yan çevrildiğinde kamerayı güncelle
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
