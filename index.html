<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>H2O Sentezi: Kimya Arka Planlı</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: white; pointer-events: none;
        }
        button {
            pointer-events: auto; padding: 12px 25px; cursor: pointer;
            background: #1a73e8; color: white; border: none; border-radius: 25px;
            font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        button:hover { background: #1557b0; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="ui">
        <button onclick="resetSimulation()">Sentezi Başlat / Sıfırla</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, oxygen, h1, h2, bond1, bond2;
        let labelO, labelH1, labelH2;
        let isMerged = false;
        const targetAngle = (104.5 * Math.PI) / 180;
        const bondLength = 1.6;

        // Arka Plan ve Efektler
        let chemistryStickersMesh; // Yeni çıkartma katmanı
        let particlesSystem;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 8;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.PointLight(0xffffff, 1.2, 100);
            light.position.set(10, 10, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x606060));

            // Arka Plan: Tamamen Siyah
            scene.background = new THREE.Color(0x000000);

            // --- YENİ BÖLÜM: KİMYA ÇIKARTMALARI (image_9.png Karalamaları) ---
            const textureLoader = new THREE.TextureLoader();
            
            // DİKKAT: Buraya 'image_9.png' görselinden elde edilen, 
            // şeffaf arka planlı, siyah karalamaları içeren görselin yolunu koymalısın.
            // Örnek: 'images/kimya_karalamalari.png'
            // Bu görsel, referanstaki mavi çizimlerin monokrom (siyah) versiyonu olmalı.
            const stickersTexture = textureLoader.load('https://threejs.org/examples/textures/crate.gif'); // Test dokusu, burası değişecek
            
            const stickersGeometry = new THREE.PlaneGeometry(20, 15);
            
            // Materyal Ayarı: 'AdditiveBlending' ile siyah arka plan üzerinde ışıyacaklar.
            // 'transparent: true' ve 'opacity' ile süzülme hissi vereceğiz.
            const stickersMaterial = new THREE.MeshBasicMaterial({ 
                map: stickersTexture, 
                side: THREE.DoubleSide, 
                transparent: true, 
                opacity: 0.15, // Başlangıçta çok hafif
                blending: THREE.AdditiveBlending // Siyah üzerinde parlama etkisi
            });
            
            chemistryStickersMesh = new THREE.Mesh(stickersGeometry, stickersMaterial);
            chemistryStickersMesh.position.z = -5; // Molekülün arkasına yerleştir
            scene.add(chemistryStickersMesh);
            // --------------------------------------------------

            // Atomlar
            oxygen = new THREE.Mesh(new THREE.SphereGeometry(0.8, 32, 32), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
            h1 = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            h2 = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            
            scene.add(oxygen, h1, h2);

            // Bağlar
            const bondGeo = new THREE.CylinderGeometry(0.1, 0.1, bondLength, 12);
            const bondMat = new THREE.MeshStandardMaterial({ color: 0xdddddd });
            bond1 = new THREE.Mesh(bondGeo, bondMat);
            bond2 = new THREE.Mesh(bondGeo, bondMat);
            bond1.visible = bond2.visible = false;
            scene.add(bond1, bond2);

            // Etiketleri Oluştur (O ve H harfleri)
            labelO = createTextLabel("O", "#ffffff");
            labelH1 = createTextLabel("H", "#333333");
            labelH2 = createTextLabel("H", "#333333");
            
            // --- KİMYASAL PARÇACIK EFEKTİ (Sentez Sonrası) ---
            createChemistryParticles();

            resetSimulation();
        }

        // Harf Etiketi Oluşturma Fonksiyonu (Canvas tabanlı Sprite)
        function createTextLabel(text, color) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 128;
            canvas.height = 128;
            ctx.fillStyle = color;
            ctx.font = "Bold 100px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, 64, 64);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(1, 1, 1);
            sprite.visible = false; // Başlangıçta gizli
            scene.add(sprite);
            return sprite;
        }

        // Soyut Kimyasal Sembollerden Parçacık Sistemi Oluşturma
        function createChemistryParticles() {
            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 50; // Stabilite için az sayıda tutuldu
            const posArray = new Float32Array(particlesCount * 3);

            for (let i = 0; i < particlesCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 20; // Geniş bir alana yay
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            // Parçacık materyali olarak soyut bir doku veya renk kullanılabilir.
            // Şimdilik basit nokta materyali.
            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.1,
                color: 0x00aaff, // Su rengi tonlarında plazma etkisi
                transparent: true,
                opacity: 0, // Başlangıçta gizli
                blending: THREE.AdditiveBlending // Işıma etkisi
            });

            particlesSystem = new THREE.Points(particlesGeometry, particlesMaterial);
            particlesSystem.position.z = -2; // Arka plan ile molekül arasında
            scene.add(particlesSystem);
        }

        function resetSimulation() {
            isMerged = false;
            oxygen.position.set(0, -6, 0);
            h1.position.set(-10, 0, 0);
            h2.position.set(10, 0, 0);
            
            bond1.visible = bond2.visible = false;
            labelO.visible = labelH1.visible = labelH2.visible = false;
            scene.rotation.y = 0;

            // Efektleri gizle
            particlesSystem.material.opacity = 0;
            chemistryStickersMesh.material.opacity = 0.15; // Çıkartmaların başlangıç opaklığı
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isMerged) {
                // Hareketler
                oxygen.position.lerp(new THREE.Vector3(0, 1, 0), 0.03);
                
                const h1Target = new THREE.Vector3(Math.sin(targetAngle / 2) * -bondLength, 1 - Math.cos(targetAngle / 2) * bondLength, 0);
                const h2Target = new THREE.Vector3(Math.sin(targetAngle / 2) * bondLength, 1 - Math.cos(targetAngle / 2) * bondLength, 0);

                h1.position.lerp(h1Target, 0.04);
                h2.position.lerp(h2Target, 0.04);

                // Birleşme kontrolü ve etiketlerin belirmesi
                if (h1.position.distanceTo(h1Target) < 0.05) {
                    isMerged = true;
                    bond1.visible = bond2.visible = true;
                    labelO.visible = labelH1.visible = labelH2.visible = true;
                    updateBonds();
                    
                    // Sentez sonrası parçacıkları yavaşça göster (Fade-in)
                    new THREE.Euler().setFromQuaternion(particlesSystem.quaternion); // Dummy call for opacity animation
                }
            } else {
                scene.rotation.y += 0.005;

                // Sentez sonrası parçacık efekti animasyonu
                particlesSystem.material.opacity = THREE.MathUtils.lerp(particlesSystem.material.opacity, 0.5, 0.01); // Maksimum 0.5 opaklık
                particlesSystem.rotation.y += 0.001; // Yavaşça dön
                particlesSystem.position.y = Math.sin(Date.now() * 0.001) * 0.2; // Hafif süzülme

                // Kimya Çıkartmalarının süzülme animasyonu
                chemistryStickersMesh.position.y = Math.cos(Date.now() * 0.0005) * 0.1; // Çok yavaş salınım
                chemistryStickersMesh.material.opacity = THREE.MathUtils.lerp(chemistryStickersMesh.material.opacity, 0.25, 0.005); // Hafifçe opaklaş
            }

            // Etiketleri atomların üzerine sabitle
            labelO.position.set(oxygen.position.x, oxygen.position.y + 1.2, oxygen.position.z);
            labelH1.position.set(h1.position.x, h1.position.y - 0.8, h1.position.z);
            labelH2.position.set(h2.position.x, h2.position.y - 0.8, h2.position.z);

            renderer.render(scene, camera);
        }

        function updateBonds() {
            alignBond(bond1, oxygen.position, h1.position);
            alignBond(bond2, oxygen.position, h2.position);
        }

        function alignBond(bond, p1, p2) {
            const dir = new THREE.Vector3().subVectors(p2, p1);
            bond.position.copy(p1).add(dir.clone().multiplyScalar(0.5));
            bond.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
